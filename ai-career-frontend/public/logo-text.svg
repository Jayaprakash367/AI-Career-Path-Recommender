<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon -->
  <g transform="translate(20, 15)">
    <!-- Brain/AI symbol -->
    <circle cx="20" cy="20" r="18" fill="none" stroke="url(#textGrad)" stroke-width="2.5"/>
    
    <!-- Neural nodes -->
    <circle cx="12" cy="10" r="3" fill="url(#textGrad)"/>
    <circle cx="28" cy="10" r="3" fill="url(#textGrad)"/>
    <circle cx="20" cy="28" r="3" fill="url(#accentGrad)"/>
    <circle cx="20" cy="20" r="2.5" fill="url(#textGrad)"/>
    
    <!-- Connections -->
    <line x1="12" y1="10" x2="20" y2="20" stroke="url(#textGrad)" stroke-width="1.5" opacity="0.6"/>
    <line x1="28" y1="10" x2="20" y2="20" stroke="url(#textGrad)" stroke-width="1.5" opacity="0.6"/>
    <line x1="20" y1="20" x2="20" y2="28" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Text Logo -->
  <text x="70" y="55" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#textGrad)" letter-spacing="1">
    AI Career
  </text>
  <text x="70" y="88" font-family="Arial, sans-serif" font-size="32" font-weight="600" fill="url(#accentGrad)" letter-spacing="0.5">
    Path Recommender
  </text>
  
  <!-- Tagline -->
  <text x="70" y="108" font-family="Arial, sans-serif" font-size="11" fill="#a78bfa" opacity="0.8" letter-spacing="1">
    Powered by Machine Learning
  </text>
  
  <!-- Decorative line -->
  <line x1="70" y1="95" x2="150" y2="95" stroke="url(#textGrad)" stroke-width="1.5" opacity="0.5"/>
</svg>

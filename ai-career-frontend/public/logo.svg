<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" fill="#0f172a"/>
  
  <!-- Outer Circle Background -->
  <circle cx="150" cy="150" r="140" fill="url(#mainGrad)" opacity="0.08"/>
  <circle cx="150" cy="150" r="140" fill="none" stroke="url(#mainGrad)" stroke-width="2" opacity="0.3"/>
  
  <!-- Left Section: Brain/AI Neural Network -->
  <g transform="translate(90, 120)" filter="url(#glow)">
    <!-- Central node -->
    <circle cx="0" cy="0" r="10" fill="#6366f1" opacity="0.9"/>
    
    <!-- Brain-like neural nodes -->
    <circle cx="-25" cy="-15" r="6" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="-28" cy="8" r="6" fill="#a78bfa" opacity="0.7"/>
    <circle cx="0" cy="-30" r="7" fill="#6366f1" opacity="0.8"/>
    <circle cx="20" cy="-18" r="6" fill="#8b5cf6" opacity="0.75"/>
    <circle cx="25" cy="5" r="6" fill="#a78bfa" opacity="0.7"/>
    
    <!-- Connecting neural lines -->
    <line x1="0" y1="0" x2="-25" y2="-15" stroke="#6366f1" stroke-width="2.5" opacity="0.5"/>
    <line x1="0" y1="0" x2="-28" y2="8" stroke="#6366f1" stroke-width="2.5" opacity="0.5"/>
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#8b5cf6" stroke-width="2.5" opacity="0.5"/>
    <line x1="0" y1="0" x2="20" y2="-18" stroke="#6366f1" stroke-width="2.5" opacity="0.5"/>
    <line x1="0" y1="0" x2="25" y2="5" stroke="#8b5cf6" stroke-width="2.5" opacity="0.5"/>
    
    <!-- Secondary connections -->
    <line x1="-25" y1="-15" x2="20" y2="-18" stroke="#a78bfa" stroke-width="1.5" opacity="0.3"/>
    <line x1="-28" y1="8" x2="25" y2="5" stroke="#a78bfa" stroke-width="1.5" opacity="0.3"/>
  </g>
  
  <!-- Right Section: Career Growth Chart -->
  <g transform="translate(180, 100)">
    <!-- Background box -->
    <rect x="-28" y="-20" width="56" height="60" fill="none" stroke="url(#accentGrad)" stroke-width="2" rx="4" opacity="0.4"/>
    
    <!-- Chart bars -->
    <rect x="-18" y="15" width="10" height="20" fill="#ec4899" rx="2" opacity="0.85"/>
    <rect x="-4" y="5" width="10" height="30" fill="#f43f5e" rx="2" opacity="0.85"/>
    <rect x="10" y="-5" width="10" height="40" fill="#06b6d4" rx="2" opacity="0.85"/>
    
    <!-- Trend line -->
    <polyline points="-13,20 1,10 15,0" fill="none" stroke="#06b6d4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    
    <!-- Arrow -->
    <g transform="translate(20, -10)">
      <line x1="0" y1="0" x2="8" y2="-15" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
      <polyline points="8,-15 5,-10 10,-11" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-linejoin="round"/>
    </g>
  </g>
  
  <!-- Center Connector: Bridge between AI and Career -->
  <g opacity="0.6">
    <line x1="130" y1="150" x2="170" y2="150" stroke="url(#mainGrad)" stroke-width="3"/>
    <circle cx="150" cy="150" r="3" fill="#6366f1"/>
  </g>
  
  <!-- Bottom: Gear/Settings (ML Model) -->
  <g transform="translate(150, 210)">
    <!-- Outer gear circle -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="url(#mainGrad)" stroke-width="3" opacity="0.7"/>
    
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="10" fill="url(#mainGrad)" opacity="0.6"/>
    
    <!-- Gear teeth -->
    <g stroke="url(#mainGrad)" stroke-width="2.5" fill="none">
      <rect x="-3" y="-25" width="6" height="7" fill="url(#mainGrad)" opacity="0.8"/>
      <rect x="17" y="-12" width="7" height="6" fill="url(#mainGrad)" opacity="0.8" transform="rotate(60 20.5 -9)"/>
      <rect x="17" y="12" width="7" height="6" fill="url(#mainGrad)" opacity="0.8" transform="rotate(120 20.5 15)"/>
      <rect x="-3" y="25" width="6" height="7" fill="url(#mainGrad)" opacity="0.8"/>
      <rect x="-24" y="12" width="7" height="6" fill="url(#mainGrad)" opacity="0.8" transform="rotate(-120 -20.5 15)"/>
      <rect x="-24" y="-12" width="7" height="6" fill="url(#mainGrad)" opacity="0.8" transform="rotate(-60 -20.5 -9)"/>
    </g>
  </g>
  
  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="4" fill="#6366f1" opacity="0.5"/>
  <circle cx="270" cy="30" r="4" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="30" cy="270" r="4" fill="#a78bfa" opacity="0.5"/>
  <circle cx="270" cy="270" r="4" fill="#6366f1" opacity="0.5"/>
  
  <!-- Outer ring -->
  <circle cx="150" cy="150" r="140" fill="none" stroke="url(#mainGrad)" stroke-width="1.5" opacity="0.2" stroke-dasharray="5,5"/>
</svg>

<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdbcb4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f4a582;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a3a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c1810;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="200" height="200" fill="#ffffff"/>

  <!-- Hair -->
  <ellipse cx="100" cy="70" rx="45" ry="50" fill="url(#hairGrad)"/>
  
  <!-- Hair highlights -->
  <ellipse cx="80" cy="50" rx="15" ry="20" fill="#3d2414" opacity="0.6"/>
  <ellipse cx="120" cy="45" rx="18" ry="22" fill="#4a2f1a" opacity="0.5"/>

  <!-- Head -->
  <circle cx="100" cy="95" r="35" fill="url(#skinGrad)"/>

  <!-- Ears -->
  <ellipse cx="68" cy="90" rx="8" ry="12" fill="url(#skinGrad)"/>
  <ellipse cx="132" cy="90" rx="8" ry="12" fill="url(#skinGrad)"/>

  <!-- Left Eye White -->
  <ellipse cx="85" cy="85" rx="8" ry="11" fill="#ffffff"/>
  <!-- Left Eye Iris -->
  <circle cx="85" cy="87" r="6" fill="#8b6914"/>
  <!-- Left Eye Pupil -->
  <circle cx="85" cy="87" r="4" fill="#000000"/>
  <!-- Left Eye Shine -->
  <circle cx="87" cy="85" r="1.5" fill="#ffffff"/>

  <!-- Right Eye White -->
  <ellipse cx="115" cy="85" rx="8" ry="11" fill="#ffffff"/>
  <!-- Right Eye Iris -->
  <circle cx="115" cy="87" r="6" fill="#8b6914"/>
  <!-- Right Eye Pupil -->
  <circle cx="115" cy="87" r="4" fill="#000000"/>
  <!-- Right Eye Shine -->
  <circle cx="117" cy="85" r="1.5" fill="#ffffff"/>

  <!-- Left Eyebrow -->
  <path d="M 75 73 Q 85 70 95 73" stroke="#5a3a2a" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Right Eyebrow -->
  <path d="M 105 73 Q 115 70 125 73" stroke="#5a3a2a" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <line x1="100" y1="90" x2="100" y2="100" stroke="#f4a582" stroke-width="1" opacity="0.7"/>

  <!-- Mouth - Happy Smile -->
  <path d="M 88 108 Q 100 115 112 108" stroke="#d97706" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="92" y="125" width="16" height="12" fill="url(#skinGrad)"/>

  <!-- Shirt -->
  <path d="M 65 140 Q 100 137 135 140 L 140 200 Q 100 205 60 200 Z" fill="url(#shirtGrad)"/>

  <!-- Shirt details -->
  <circle cx="100" cy="155" r="8" fill="#2563eb" opacity="0.6"/>

  <!-- Sparkles for personality -->
  <g>
    <circle cx="50" cy="70" r="2.5" fill="#f97316"/>
    <circle cx="150" cy="75" r="2" fill="#fb923c"/>
    <circle cx="55" cy="130" r="1.5" fill="#ea580c"/>
  </g>
</svg>

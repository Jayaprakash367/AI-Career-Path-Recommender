<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" opacity="0.1"/>
  
  <!-- Brain/AI Icon - Left side -->
  <g transform="translate(70, 60)">
    <!-- Brain nodes -->
    <circle cx="0" cy="0" r="6" fill="#6366f1"/>
    <circle cx="12" cy="-8" r="5" fill="#8b5cf6"/>
    <circle cx="15" cy="6" r="5" fill="#a78bfa"/>
    
    <!-- Connecting lines -->
    <line x1="0" y1="0" x2="12" y2="-8" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="15" y2="6" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
    <line x1="12" y1="-8" x2="15" y2="6" stroke="#8b5cf6" stroke-width="2" opacity="0.4"/>
  </g>
  
  <!-- Career Path - Right side (arrow/chart) -->
  <g transform="translate(100, 70)">
    <!-- Upward trend bars -->
    <rect x="0" y="15" width="6" height="10" fill="#ec4899" rx="1"/>
    <rect x="10" y="8" width="6" height="17" fill="#f43f5e" rx="1"/>
    <rect x="20" y="0" width="6" height="25" fill="#06b6d4" rx="1"/>
    
    <!-- Arrow pointing up -->
    <line x1="28" y1="20" x2="35" y2="5" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="35,5 32,10 37,8" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linejoin="round"/>
  </g>
  
  <!-- Center Connection Line (representing AI bridge) -->
  <line x1="85" y1="85" x2="100" y2="85" stroke="#6366f1" stroke-width="2.5" opacity="0.7" stroke-dasharray="3,3"/>
  
  <!-- Bottom decorative element: gear (AI/ML symbol) -->
  <g transform="translate(100, 130)">
    <!-- Gear teeth -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="6" fill="#6366f1" opacity="0.8"/>
    
    <!-- Gear teeth pattern -->
    <rect x="-2" y="-16" width="4" height="4" fill="#8b5cf6"/>
    <rect x="11" y="-8" width="4" height="4" fill="#8b5cf6" transform="rotate(60 13 -6)"/>
    <rect x="11" y="8" width="4" height="4" fill="#8b5cf6" transform="rotate(120 13 10)"/>
    <rect x="-2" y="16" width="4" height="4" fill="#8b5cf6"/>
    <rect x="-15" y="8" width="4" height="4" fill="#8b5cf6" transform="rotate(-120 -13 10)"/>
    <rect x="-15" y="-8" width="4" height="4" fill="#8b5cf6" transform="rotate(-60 -13 -6)"/>
  </g>
  
  <!-- Outer ring accent -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.4"/>
</svg>
